<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
<title id="title">Map of Blackwood</title><desc id="desc">A dark illustrated town map with forest, roads, a lake, river and district landmarks.</desc>
<defs>
  <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#121614"/><stop offset=".52" stop-color="#171813"/><stop offset="1" stop-color="#090c0c"/></linearGradient>
