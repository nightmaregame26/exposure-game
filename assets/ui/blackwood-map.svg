  <pattern id="contours" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M-10 30Q20 5 48 25T90 30M-15 60Q22 35 52 57T94 62" fill="none" stroke="#8e795d" stroke-opacity=".055" stroke-width="2"/></pattern>
