<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Café Hollow on a rainy Blackwood evening</title>
<desc id="desc">A wet cobblestone street with warm café windows, lamp posts and a dark church spire.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#091119"/><stop offset=".55" stop-color="#1b272e"/><stop offset="1" stop-color="#080b0d"/></linearGradient>
  <linearGradient id="street" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#323b3e"/><stop offset="1" stop-color="#090b0c"/></linearGradient>
  <linearGradient id="shop" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#efc07e"/><stop offset=".48" stop-color="#9b572d"/><stop offset="1" stop-color="#32170f"/></linearGradient>
  <radialGradient id="glow"><stop stop-color="#ffd38e" stop-opacity=".92"/><stop offset=".35" stop-color="#d98c48" stop-opacity=".3"/><stop offset="1" stop-color="#d98c48" stop-opacity="0"/></radialGradient>
  <pattern id="rain" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="rotate(11)"><line x1="8" y1="0" x2="8" y2="21" stroke="#c8d6dc" stroke-opacity=".15" stroke-width="2"/><line x1="30" y1="14" x2="30" y2="38" stroke="#e1e9ec" stroke-opacity=".1" stroke-width="1.5"/></pattern>
  <filter id="blur"><feGaussianBlur stdDeviation="13"/></filter>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2" seed="4" result="n"/><feColorMatrix in="n" type="saturate" values="0" result="g"/><feBlend in="SourceGraphic" in2="g" mode="soft-light"/></filter>
</defs>
