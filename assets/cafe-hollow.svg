<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cafe Hollow at night</title><desc id="desc">A rainy Blackwood street with Cafe Hollow glowing warmly.</desc>
