    <radialGradient id="warm"><stop stop-color="#ffd690" stop-opacity=".95"/><stop offset=".35" stop-color="#d98d3f" stop-opacity=".45"/><stop offset="1" stop-color="#d98d3f" stop-opacity="0"/></radialGradient>
    <pattern id="rain" width="42" height="60" patternUnits="userSpaceOnUse" patternTransform="skewX(-15)"><path d="M12 0v34M32 16v38" stroke="#d5e4e9" stroke-opacity=".14" stroke-width="2"/></pattern>
