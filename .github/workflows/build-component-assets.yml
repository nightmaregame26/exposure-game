name: Build Exposure UI Assets

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_component_assets.py'
      - 'assets/exact/home/**'
      - '.github/workflows/build-component-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Build independent panel assets
        run: python scripts/build_component_assets.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ui/components
          if git diff --cached --quiet; then
            echo "Component assets are already current."
          else
            git commit -m "Generate independent Exposure UI panel assets"
            git push
          fi
