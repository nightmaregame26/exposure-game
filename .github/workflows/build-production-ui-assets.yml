name: Build Production UI Assets

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_production_ui_assets.py'
      - '.github/workflows/build-production-ui-assets.yml'
      - 'assets/exact/**'
      - 'assets/mockups/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: exposure-production-ui-assets
  cancel-in-progress: true

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Generate static WebP assets
        run: python scripts/build_production_ui_assets.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ui/production
          if git diff --cached --quiet; then
            echo "Production assets are already current."
          else
            git commit -m "Generate static Exposure production UI assets"
            git push
          fi
